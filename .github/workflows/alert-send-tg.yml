name: Send Alert

on:
  workflow_dispatch: # Кнопка для ручного запуску
  repository_dispatch:
      types: [ grafana-alert ]

jobs:
  render_and_send:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TZ: "Europe/Kyiv"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # ЦЕЙ КРОК ВИПРАВИТЬ ПОМИЛКУ
      - name: Use Data
        run: |
          echo "Пристрій: ${{ github.event.client_payload.device }}"
          echo "Значення: ${{ github.event.client_payload.value }}"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=⚠️ Зафіксовано небезпечну напругу: ${{ github.event.client_payload.value }} Вольт"
