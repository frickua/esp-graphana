name: Send Grafana Graph to Telegram

on:
  workflow_dispatch: # Кнопка для ручного запуску
  schedule:
#    - cron: '0 * * * *'

jobs:
  render_and_send:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
      BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
      TZ: "Europe/Kyiv"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # ЦЕЙ КРОК ВИПРАВИТЬ ПОМИЛКУ
      - name: Render Grafana Panel to PNG
        run: |
          curl -H "Authorization: Bearer ${{ secrets.GRAFANA_TOKEN }}" \
          "https://frickua.grafana.net/render/d-solo/frqvfml/esp-board?orgId=1&from=now-3h&to=now&panelId=1&tz=Europe%2FKyiv&var-channel=ha" \
          --output chart.png

#      - name: Send Image to Telegram
#        run: |
#          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendPhoto \
#            -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
#            -F photo=@"chart.png" \
#            -F caption="📊 Напруга за останню добу"

      - name: Process Telegram Update
        shell: python
        run: |
            import os, requests, json, subprocess
            from datetime import datetime
            
            # 1. Отримуємо дані з оточення
            bot_token = os.getenv('BOT_TOKEN')
            chat_id = os.getenv('CHAT_ID')
            curr_date = datetime.now().strftime('%Y-%m-%d')
            
            # 2. Отримуємо змінні через GitHub CLI
            def get_gh_var(name):
                try:
                    return subprocess.check_output(['gh', 'variable', 'get', name]).decode().strip()
                except:
                    return ""
            
            saved_id = get_gh_var('LAST_MSG_ID')
            saved_date = get_gh_var('LAST_MSG_DATE')
            
            # 3. Логіка: Редагувати чи Надсилати нове
            photo_path = 'chart.png'
            caption = f"📊 Статистика напруги. Оновлено: {datetime.now().strftime('%H:%M')} (Дата: {curr_date})"
            
            if saved_date == curr_date and saved_id:
                # РЕДАГУЄМО (editMessageMedia)
                url = f"https://api.telegram.org/bot{bot_token}/editMessageMedia"
                files = {'photo': open(photo_path, 'rb')}
                data = {
                    'chat_id': chat_id,
                    'message_id': saved_id,
                    'media': json.dumps({
                        'type': 'photo',
                        'media': 'attach://photo',
                        'caption': caption
                    })
                }
                requests.post(url, data=data, files=files)
                print(f"Message {saved_id} updated.")
            else:
                # НАДСИЛАЄМО НОВЕ (sendPhoto)
                url = f"https://api.telegram.org/bot{bot_token}/sendPhoto"
                with open(photo_path, 'rb') as f:
                    r = requests.post(url, data={'chat_id': chat_id, 'caption': caption}, files={'photo': f})
            
                new_id = r.json().get('result', {}).get('message_id')
                if new_id:
                    # Зберігаємо нові дані в GitHub Variables
                    subprocess.run(['gh', 'variable', 'set', 'LAST_MSG_ID', '--body', str(new_id)])
                    subprocess.run(['gh', 'variable', 'set', 'LAST_MSG_DATE', '--body', curr_date])
                    print(f"New message sent: {new_id}")
